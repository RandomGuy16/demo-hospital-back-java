services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospitaldb
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospitaldb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: hospital
      SPRING_DATASOURCE_PASSWORD: hospital
    ports:
      - "8080:8080"

volumes:
  postgres-data:
